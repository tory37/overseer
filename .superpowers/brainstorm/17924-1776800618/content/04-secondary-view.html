<h2>Secondary View Concept</h2>
<p class="subtitle">What should live alongside the Agent terminal?</p>

<div class="options">
  <div class="option" data-choice="raw-shell" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>Raw Shell</h3>
      <p>A standard bash/zsh terminal. Total freedom to run npm, git, vim, etc. directly.</p>
    </div>
  </div>
  <div class="option" data-choice="git-focused" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Git-Focused UI</h3>
      <p>A specialized view for diffs, staging, and commits. Less typing, more visual status.</p>
    </div>
  </div>
</div>
