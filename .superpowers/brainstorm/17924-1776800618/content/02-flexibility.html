<h2>Concept: Free-form Hierarchy</h2>
<p class="subtitle">Organize your workspace without rigid rules.</p>

<div class="options">
  <div class="option" data-choice="folders" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>Nested Folders</h3>
      <p>Create arbitrary folders (e.g., "Active", "Clients > Acme", "Archive") and drag repos into them.</p>
    </div>
  </div>
  <div class="option" data-choice="tagging" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Tags & Views</h3>
      <p>Assign tags to repos and create custom "views" or "dashboards" based on those tags.</p>
    </div>
  </div>
</div>
